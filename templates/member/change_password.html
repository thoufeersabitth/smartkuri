{% extends "member/member_base.html" %}
{% load static %}

{% block title %}Security | Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="password-card animate-in">
            <div class="card-header-pro">
                <div class="lock-icon-wrap">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h3>Update Password</h3>
                <p class="text-muted small">Enter a strong password to secure your account</p>
            </div>

            <form method="POST" class="mt-4" id="passwordForm">
                {% csrf_token %}

                <div class="form-group-pro mb-3">
                    <label class="pro-label">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input type="password" id="new_password" name="new_password" class="pro-input" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePassword('new_password', this)"></i>
                    </div>
                    <div class="strength-meter mt-2">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <small id="strengthText" class="text-muted" style="font-size: 0.75rem;">Password strength</small>
                </div>

                <div class="form-group-pro mb-4">
                    <label class="pro-label">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock-check input-icon"></i>
                        <input type="password" id="confirm_password" name="confirm_password" class="pro-input" placeholder="••••••••" required>
                        <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePassword('confirm_password', this)"></i>
                    </div>
                    <div id="matchText" class="mt-1" style="font-size: 0.75rem; font-weight: 700;"></div>
                </div>

                <button type="submit" class="btn-ultra-save w-100" id="submitBtn">
                    <span>Update Credentials</span>
                    <i class="fa-solid fa-arrow-right-long ms-2"></i>
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="{% url 'members:member_profile' %}" class="back-link">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Profile
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    /* 🎨 Premium Page Styling */
    .password-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 30px;
        padding: 40px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
    }

    .card-header-pro { text-align: center; }

    .lock-icon-wrap {
        width: 60px; height: 60px; background: #6366f1; color: white;
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem; margin: 0 auto 20px;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }

    .card-header-pro h3 { font-weight: 800; color: #1e293b; letter-spacing: -1px; }

    .pro-label { font-weight: 700; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; display: block; }

    .input-wrapper { position: relative; }

    .input-icon {
        position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
        color: #6366f1; font-size: 1rem;
    }

    .toggle-pass {
        position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
        cursor: pointer; color: #94a3b8; transition: 0.3s;
    }
    .toggle-pass:hover { color: #6366f1; }

    .pro-input {
        width: 100%; padding: 14px 45px 14px 48px;
        background: white; border: 1px solid #e2e8f0; border-radius: 15px;
        font-weight: 600; transition: 0.3s; outline: none;
    }

    .pro-input:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

    /* Strength Meter */
    .strength-meter { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; transition: 0.4s ease; }

    /* Button */
    .btn-ultra-save {
        background: #6366f1; color: white; border: none; padding: 16px;
        border-radius: 15px; font-weight: 800; display: flex; align-items: center;
        justify-content: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }
    .btn-ultra-save:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(99, 102, 241, 0.3); }
    .btn-ultra-save:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

    .back-link { text-decoration: none; color: #64748b; font-weight: 700; font-size: 0.9rem; transition: 0.2s; }
    .back-link:hover { color: #6366f1; }

    .animate-in { animation: slideUp 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
    // 1. Show/Hide Password Toggle
    function togglePassword(id, el) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            el.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = 'password';
            el.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }

    const newPass = document.getElementById('new_password');
    const confirmPass = document.getElementById('confirm_password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const matchText = document.getElementById('matchText');
    const submitBtn = document.getElementById('submitBtn');

    // 2. Real-time Strength Check
    newPass.addEventListener('input', () => {
        const val = newPass.value;
        let strength = 0;
        if (val.length >= 6) strength += 25;
        if (val.match(/[A-Z]/)) strength += 25;
        if (val.match(/[0-9]/)) strength += 25;
        if (val.match(/[^A-Za-z0-9]/)) strength += 25;

        strengthBar.style.width = strength + '%';
        
        if (strength <= 25) {
            strengthBar.style.backgroundColor = '#ef4444';
            strengthText.innerText = 'Weak password';
        } else if (strength <= 75) {
            strengthBar.style.backgroundColor = '#f59e0b';
            strengthText.innerText = 'Medium strength';
        } else {
            strengthBar.style.backgroundColor = '#10b981';
            strengthText.innerText = 'Strong password';
        }
        checkMatch();
    });

    // 3. Confirm Password Match Check
    function checkMatch() {
        if (confirmPass.value === "") {
            matchText.innerText = "";
            submitBtn.disabled = true;
            return;
        }
        if (newPass.value === confirmPass.value) {
            matchText.innerText = "✓ Passwords match";
            matchText.style.color = "#10b981";
            submitBtn.disabled = false;
        } else {
            matchText.innerText = "× Passwords do not match";
            matchText.style.color = "#ef4444";
            submitBtn.disabled = true;
        }
    }

    confirmPass.addEventListener('input', checkMatch);
</script>
{% endblock %}
